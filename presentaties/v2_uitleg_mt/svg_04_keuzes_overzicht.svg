<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" role="img" aria-label="Drie keuzes voor je geo-kaart">
  <title>Kies je geo-kaart: drie stappen</title>
  <desc>Om een kaart te maken kies je: element, gebied, en daarna bouw je een statische kaart op vanuit je prompt. Stap 6 laat zien hoe je van kaart naar sturing gaat met rapport en dashboard.</desc>

  <rect width="1200" height="940" fill="#ffffff"/>

  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Kies je kaart in 3 stappen</text>
  <text x="600" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">Eerst element, dan gebied, daarna statische kaart vanuit je prompt</text>

  <!-- Keuze 1: Element -->
  <rect x="90" y="170" width="300" height="330" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="90" y="170" width="300" height="56" rx="16" fill="#e2e8f0"/>
  <rect x="90" y="198" width="300" height="28" fill="#e2e8f0"/>
  <text x="240" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#64748b">KEUZE 1</text>
  <text x="240" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e293b">Kies 1 element</text>
  <text x="240" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">Afvalbakken</text>
  <text x="240" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">Bomen</text>
  <text x="240" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">Lichtpunten</text>
  <text x="240" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Kies uit 3 elementen</text>
  <text x="240" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">voor je kaartvraag</text>
  <text x="240" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">(afvalbakken, bomen, lichtpunten)</text>

  <!-- Pijl 1→2 -->
  <line x1="394" y1="335" x2="454" y2="335" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Keuze 2: Gebied -->
  <rect x="458" y="170" width="284" height="330" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <rect x="458" y="170" width="284" height="56" rx="16" fill="#dbeafe"/>
  <rect x="458" y="198" width="284" height="28" fill="#dbeafe"/>
  <text x="600" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">KEUZE 2</text>
  <text x="600" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">Kies het gebied</text>
  <text x="600" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1d4ed8">Gemeente</text>
  <text x="600" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1d4ed8">Gebied</text>
  <text x="600" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1d4ed8">Buurt</text>
  <text x="600" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1d4ed8">Subbuurt</text>
  <text x="600" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#60a5fa">Schaalniveau voor je analyse</text>

  <!-- Pijl 2→3 -->
  <line x1="746" y1="335" x2="806" y2="335" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Keuze 3: Statische kaart -->
  <rect x="810" y="170" width="300" height="330" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <rect x="810" y="170" width="300" height="56" rx="16" fill="#dcfce7"/>
  <rect x="810" y="198" width="300" height="28" fill="#dcfce7"/>
  <text x="960" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#22c55e">KEUZE 3</text>
  <text x="960" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#14532d">Statische kaart opbouwen</text>
  <text x="960" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#166534">Vanuit je prompt</text>
  <text x="960" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4ade80">AI zet je vraag direct om naar kaart</text>
  <line x1="890" y1="355" x2="1030" y2="355" stroke="#bbf7d0" stroke-width="1"/>
  <text x="960" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#166534">Output: PNG/SVG kaart</text>
  <text x="960" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4ade80">Klaar voor rapport of presentatie</text>
  <text x="960" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#86efac">Altijd: titel, legenda, schaalstok</text>

  <!-- Pijl 3→6 -->
  <line x1="960" y1="505" x2="960" y2="610" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stap 6: Sturing -->
  <rect x="90" y="620" width="1020" height="200" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <rect x="90" y="620" width="1020" height="56" rx="16" fill="#ffedd5"/>
  <rect x="90" y="648" width="1020" height="28" fill="#ffedd5"/>
  <text x="600" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ea580c">STAP 6</text>
  <text x="600" y="704" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#9a3412">Hoe gaan we hierop sturen?</text>
  <text x="280" y="748" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c2410c">Geef mij alleen de iepen</text>
  <text x="600" y="748" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c2410c">% afvalbakken dichtbij de Coolsingel</text>
  <text x="905" y="748" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c2410c">Waar zijn de grootste tekorten?</text>
  <text x="600" y="786" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#9a3412">Maak van deze kaartinformatie een rapport en een dashboard</text>

  <!-- Onderbalk -->
  <rect x="90" y="848" width="1020" height="68" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="600" y="890" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Van kaart naar sturing: analyse, rapport en dashboard</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
