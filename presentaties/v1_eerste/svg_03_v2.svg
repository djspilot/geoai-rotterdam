<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Drie stappen — en de kaart is klaar</text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#475569">Geen code, geen GIS-kennis, geen technische achtergrond nodig</text>

  <!-- Step 1: Vraag stellen -->
  <circle cx="220" cy="260" r="52" fill="#e2e8f0"/>
  <text x="220" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">1</text>

  <text x="220" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e293b">Vraag stellen</text>
  <text x="220" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">Typ je vraag in gewone taal</text>
  <text x="220" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">Geen code of script nodig</text>
  <text x="220" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">Iedereen kan dit</text>

  <rect x="96" y="462" width="250" height="52" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="221" y="484" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#334155">"Kaart afvalbakken</text>
  <text x="221" y="502" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#334155">Rotterdam-Zuid"</text>

  <!-- Arrow 1→2 -->
  <line x1="310" y1="260" x2="490" y2="260" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2: AI verwerkt -->
  <circle cx="600" cy="260" r="52" fill="#dbeafe"/>
  <text x="600" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#1e3a8a">2</text>

  <text x="600" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">AI pakt de data op</text>
  <text x="600" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">Haalt gemeentelijke bronnen op</text>
  <text x="600" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">Combineert en analyseert</text>
  <text x="600" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">Automatisch, op de achtergrond</text>

  <rect x="476" y="462" width="250" height="52" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="601" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">Gemeentelijke databronnen</text>
  <text x="601" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">automatisch gecombineerd</text>

  <!-- Arrow 2→3 -->
  <line x1="690" y1="260" x2="870" y2="260" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 3: Resultaat klaar -->
  <circle cx="980" cy="260" r="52" fill="#dcfce7"/>
  <text x="980" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#166534">3</text>

  <text x="980" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#166534">Resultaat klaar</text>
  <text x="980" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">Kaart, rapport of dashboard</text>
  <text x="980" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">Direct bruikbaar</text>
  <text x="980" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#334155">Klaar voor vergadering of MT</text>

  <rect x="856" y="462" width="250" height="52" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="981" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">Kaart + rapport + dashboard</text>
  <text x="981" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">in minder dan 1 minuut</text>

  <!-- Bottom bar -->
  <rect x="88" y="548" width="1024" height="58" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="600" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Doel: van vraag naar inzicht in minder dan een minuut</text>
</svg>
