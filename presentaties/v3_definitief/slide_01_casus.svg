<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Title & Subtitle -->
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#0f172a">Vandaag: Geen presentatie, maar actie</text>
  <text x="600" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">Een praktische casus: Hoe AI de geo-expert ondersteunt</text>

  <!-- The Duo -->
  <rect x="100" y="180" width="440" height="300" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="320" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">De Expert</text>
  <text x="320" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Kennis van systemen &amp; stad</text>
  <text x="320" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Bepaalt de koers</text>
  <text x="320" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Valideert de uitkomst</text>
  <text x="320" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Vraagt in gewone taal</text>

  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#3b82f6">+</text>

  <rect x="660" y="180" width="440" height="300" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="880" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">De AI-Assistent</text>
  <text x="880" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1d4ed8">Bouwt de techniek 'onder water'</text>
  <text x="880" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e40af">Haalt de data op</text>
  <text x="880" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e40af">Bouwt de GIS-kaart</text>
  <text x="880" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e40af">Schrijft het rapport</text>

  <!-- Bottom bar -->
  <rect x="100" y="540" width="1000" height="75" rx="14" fill="#0f172a"/>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Resultaat: Razendsnel van ruwe data naar een kant-en-klaar rapport.</text>
</svg>
