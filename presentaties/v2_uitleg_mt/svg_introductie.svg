<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-label="Visual Studio Code en Codex uitleg">
  <title>Visual Studio Code + Codex</title>
  <desc>Uitleg voor leken en managers: VS Code en Codex sturen LLM's aan die acties uitvoeren om producten te maken, zoals GIS kaarten.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#bg)" rx="16"/>

  <!-- Header -->
  <text x="450" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#e2e8f0" text-anchor="middle">Hoe Codex werkt — van idee naar product</text>
  <text x="450" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Visual Studio Code + AI = jouw digitale assistent die echt iets bouwt</text>

  <!-- VS Code window -->
  <rect x="40" y="95" width="420" height="380" rx="10" fill="url(#panelGrad)" stroke="#3d4a5c" stroke-width="1.5"/>

  <!-- Window title bar -->
  <rect x="40" y="95" width="420" height="30" rx="10" fill="#1e2530"/>
  <rect x="40" y="115" width="420" height="10" fill="#1e2530"/>
  <!-- Traffic lights -->
  <circle cx="60" cy="110" r="6" fill="#ff5f57"/>
  <circle cx="78" cy="110" r="6" fill="#febc2e"/>
  <circle cx="96" cy="110" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="210" y="115" font-family="system-ui,sans-serif" font-size="11" fill="#8892a4" text-anchor="middle">codex_werkend.py — Visual Studio Code</text>

  <!-- File tabs -->
  <rect x="40" y="120" width="80" height="24" rx="4" fill="#2d3748"/>
  <text x="80" y="136" font-family="monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">codex_werkend.py</text>

  <!-- Code area -->
  <rect x="55" y="155" width="390" height="200" rx="4" fill="url(#codeGrad)"/>

  <!-- Code lines -->
  <text x="65" y="178" font-family="monospace" font-size="12" fill="#7dd3fc">from</text>
  <text x="110" y="178" font-family="monospace" font-size="12" fill="#c4b5fd">geopandas</text>
  <text x="195" y="178" font-family="monospace" font-size="12" fill="#7dd3fc"> import</text>
  <text x="235" y="178" font-family="monospace" font-size="12" fill="#86efac"> GeoDataFrame</text>

  <text x="65" y="200" font-family="monospace" font-size="12" fill="#7dd3fc">import</text>
  <text x="105" y="200" font-family="monospace" font-size="12" fill="#c4b5fd"> matplotlib.pyplot</text>
  <text x="215" y="200" font-family="monospace" font-size="12" fill="#7dd3fc"> as</text>
  <text x="235" y="200" font-family="monospace" font-size="12" fill="#86efac"> plt</text>

  <text x="65" y="224" font-family="monospace" font-size="12" fill="#94a3b8"># Laad bomen data</text>

  <text x="65" y="248" font-family="monospace" font-size="12" fill="#86efac">bomen</text>
  <text x="105" y="248" font-family="monospace" font-size="12" fill="#e2e8f0"> = </text>
  <text x="115" y="248" font-family="monospace" font-size="12" fill="#fbbf24">GeoDataFrame</text>
  <text x="210" y="248" font-family="monospace" font-size="12" fill="#e2e8f0">(</text>
  <text x="220" y="248" font-family="monospace" font-size="12" fill="#7dd3fc">"bomen_rotterdam.gpkg"</text>
  <text x="345" y="248" font-family="monospace" font-size="12" fill="#e2e8f0">)</text>

  <text x="65" y="272" font-family="monospace" font-size="12" fill="#86efac">bomen</text>
  <text x="105" y="272" font-family="monospace" font-size="12" fill="#e2e8f0">.</text>
  <text x="115" y="272" font-family="monospace" font-size="12" fill="#f0abfc">plot</text>
  <text x="145" y="272" font-family="monospace" font-size="12" fill="#e2e8f0">(</text>
  <text x="155" y="272" font-family="monospace" font-size="12" fill="#7dd3fc">column=</text>
  <text x="205" y="272" font-family="monospace" font-size="12" fill="#86efac">"soort"</text>
  <text x="245" y="272" font-family="monospace" font-size="12" fill="#e2e8f0">, cmap=</text>
  <text x="305" y="272" font-family="monospace" font-size="12" fill="#7dd3fc">"viridis"</text>
  <text x="350" y="272" font-family="monospace" font-size="12" fill="#e2e8f0">)</text>

  <text x="65" y="296" font-family="monospace" font-size="12" fill="#86efac">plt</text>
  <text x="93" y="296" font-family="monospace" font-size="12" fill="#e2e8f0">.</text>
  <text x="103" y="296" font-family="monospace" font-size="12" fill="#f0abfc">savefig</text>
  <text x="155" y="296" font-family="monospace" font-size="12" fill="#e2e8f0">(</text>
  <text x="165" y="296" font-family="monospace" font-size="12" fill="#7dd3fc">"kaart.png"</text>
  <text x="240" y="296" font-family="monospace" font-size="12" fill="#e2e8f0">, dpi=</text>
  <text x="280" y="296" font-family="monospace" font-size="12" fill="#86efac">300</text>
  <text x="300" y="296" font-family="monospace" font-size="12" fill="#e2e8f0">)</text>

  <!-- Terminal section -->
  <rect x="55" y="365" width="390" height="95" rx="4" fill="#0d1117" stroke="#2d3748" stroke-width="1"/>
  <text x="65" y="383" font-family="monospace" font-size="11" fill="#3fb950">▶运行中</text>
  <text x="120" y="383" font-family="monospace" font-size="11" fill="#6e7681"> python kaart_bomen.py</text>
  <text x="65" y="402" font-family="monospace" font-size="10" fill="#94a3b8">Kaart wordt gegenereerd...</text>
  <text x="65" y="418" font-family="monospace" font-size="10" fill="#94a3b8">Data geladen: 12.847 bomen</text>
  <text x="65" y="434" font-family="monospace" font-size="10" fill="#3fb950">✓ kaart.png aangemaakt (300 DPI)</text>

  <!-- VS Code label -->
  <rect x="180" y="465" width="160" height="26" rx="6" fill="#007acc" opacity="0.9"/>
  <text x="260" y="482" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Visual Studio Code</text>

  <!-- Arrow -->
  <path d="M 485 285 L 535 285" stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="535,280 550,285 535,290" fill="#60a5fa"/>

  <!-- Codex / LLM brain box -->
  <rect x="560" y="110" width="300" height="320" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
  <rect x="560" y="110" width="300" height="40" rx="12" fill="#4c1d95"/>
  <rect x="560" y="135" width="300" height="15" fill="#4c1d95"/>
  <text x="710" y="133" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#e9d5ff" text-anchor="middle">🤖 Codex / LLM</text>

  <!-- Brain interior -->
  <text x="600" y="178" font-family="system-ui,sans-serif" font-size="13" fill="#c4b5fd">Jij typt:</text>
  <rect x="600" y="185" width="220" height="32" rx="6" fill="#312e81"/>
  <text x="610" y="206" font-family="system-ui,sans-serif" font-size="11" fill="#e9d5ff">"Maak een kaart van alle bomen"</text>

  <text x="600" y="245" font-family="system-ui,sans-serif" font-size="13" fill="#c4b5fd">LLM denkt:</text>
  <text x="600" y="268" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc">→ Python code schrijven</text>
  <text x="600" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc">→ GIS data ophalen</text>
  <text x="600" y="308" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc">→ Kaart renderen</text>
  <text x="600" y="328" font-family="system-ui,sans-serif" font-size="11" fill="#a5b4fc">→ Resultaat opslaan als PNG</text>

  <text x="600" y="365" font-family="system-ui,sans-serif" font-size="13" fill="#c4b5fd">Resultaat:</text>
  <rect x="600" y="375" width="220" height="30" rx="6" fill="#065f46"/>
  <text x="710" y="395" font-family="system-ui,sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">✅ GIS kaart klaar!</text>

  <!-- Codex label -->
  <rect x="620" y="465" width="180" height="26" rx="6" fill="#7c3aed" opacity="0.9"/>
  <text x="710" y="482" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Codex = AI assistent</text>

  <!-- Bottom explanation boxes -->
  <rect x="40" y="498" width="820" height="34" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="519" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    Jij geeft instructies → Codex schrijft code → VS Code voert uit → Resultaat: een kaart, rapport, of dashboard
  </text>
</svg>