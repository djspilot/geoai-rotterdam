<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Stel een vraag — krijg een kaart</text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#475569">In gewone taal, geen technische kennis nodig</text>

  <!-- Left: Prompt box -->
  <rect x="80" y="132" width="440" height="360" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="80" y="132" width="440" height="50" rx="16" fill="#e2e8f0"/>
  <rect x="80" y="158" width="440" height="24" fill="#e2e8f0"/>
  <circle cx="106" cy="157" r="7" fill="#ef4444"/>
  <circle cx="128" cy="157" r="7" fill="#f59e0b"/>
  <circle cx="150" cy="157" r="7" fill="#22c55e"/>
  <text x="300" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Jij typt een vraag</text>

  <rect x="100" y="206" width="400" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="300" y="244" text-anchor="middle" font-family="Courier New, monospace" font-size="17" fill="#1e293b">Maak een kaart van alle</text>
  <text x="300" y="268" text-anchor="middle" font-family="Courier New, monospace" font-size="17" fill="#1e293b">afvalbakken in Rotterdam-</text>
  <text x="300" y="292" text-anchor="middle" font-family="Courier New, monospace" font-size="17" fill="#1e293b">Zuid, per buurt</text>
  <rect x="302" y="298" width="10" height="3" fill="#475569"/>

  <text x="300" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#64748b">Geen code</text>
  <text x="300" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#64748b">Geen GIS-kennis nodig</text>
  <text x="300" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#64748b">Geen technische achtergrond</text>
  <text x="300" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Gewone taal volstaat</text>

  <!-- Center arrow -->
  <line x1="534" y1="312" x2="634" y2="312" stroke="#475569" stroke-width="4"/>
  <polygon points="634,304 634,320 650,312" fill="#475569"/>
  <text x="592" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">AI verwerkt</text>

  <!-- Right: Results -->
  <rect x="660" y="132" width="460" height="360" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <rect x="660" y="132" width="460" height="50" rx="16" fill="#dcfce7"/>
  <rect x="660" y="158" width="460" height="24" fill="#dcfce7"/>
  <text x="890" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#16a34a">Wat je terugkrijgt</text>

  <rect x="680" y="206" width="420" height="72" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="890" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Geo kaart</text>
  <text x="890" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4ade80">Rotterdam op de kaart, per buurt gekleurd</text>

  <rect x="680" y="292" width="420" height="72" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="890" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Rapport</text>
  <text x="890" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4ade80">Bevindingen klaar voor vergadering of MT</text>

  <rect x="680" y="378" width="420" height="72" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="890" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Dashboard</text>
  <text x="890" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4ade80">Live sturen op actuele cijfers</text>

  <!-- Bottom bar -->
  <rect x="80" y="520" width="1040" height="62" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="600" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">Jij stelt de vraag — AI bouwt de kaart, het rapport en het dashboard</text>
  <text x="600" y="574" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">Geen code, geen wachten, geen technische kennis vereist</text>

  <text x="600" y="634" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">De presentator laat dit straks live zien</text>
</svg>
