<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Van data naar kaart: nu kost dat weken</text>
  <text x="600" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">We hebben de data al — maar bruikbare inzichten zijn weken verder</text>

  <line x1="600" y1="108" x2="600" y2="612" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="88" y="108" width="488" height="46" rx="10" fill="#fee2e2"/>
  <text x="332" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#dc2626">Zonder AI — hoe het nu gaat</text>

  <rect x="624" y="108" width="488" height="46" rx="10" fill="#dcfce7"/>
  <text x="868" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#16a34a">Met AI — vandaag</text>

  <rect x="108" y="172" width="430" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="323" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">1. Vraag stellen aan het GIS-team</text>
  <line x1="323" y1="216" x2="323" y2="232" stroke="#fca5a5" stroke-width="2"/>
  <polygon points="315,232 331,232 323,244" fill="#fca5a5"/>

  <rect x="108" y="245" width="430" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="323" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">2. Script schrijven of uitbesteden</text>
  <line x1="323" y1="289" x2="323" y2="305" stroke="#fca5a5" stroke-width="2"/>
  <polygon points="315,305 331,305 323,317" fill="#fca5a5"/>

  <rect x="108" y="318" width="430" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="323" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">3. Kaart handmatig bouwen</text>
  <line x1="323" y1="362" x2="323" y2="378" stroke="#fca5a5" stroke-width="2"/>
  <polygon points="315,378 331,378 323,390" fill="#fca5a5"/>

  <rect x="108" y="391" width="430" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="323" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">4. Feedback verwerken, opnieuw beginnen</text>
  <line x1="323" y1="435" x2="323" y2="451" stroke="#fca5a5" stroke-width="2"/>
  <polygon points="315,451 331,451 323,463" fill="#fca5a5"/>

  <rect x="108" y="464" width="430" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="323" y="491" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">5. Opleveren... weken later</text>

  <circle cx="165" cy="552" r="20" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="165" y1="542" x2="165" y2="552" stroke="#dc2626" stroke-width="2"/>
  <line x1="165" y1="552" x2="173" y2="557" stroke="#dc2626" stroke-width="2"/>
  <text x="196" y="558" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#dc2626">2 tot 4 uur</text>

  <rect x="644" y="222" width="430" height="64" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="859" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#166534">1. Stel een vraag in gewone taal</text>
  <text x="859" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4ade80">"Kaart afvalbakken Rotterdam-Zuid per buurt"</text>

  <line x1="859" y1="286" x2="859" y2="346" stroke="#86efac" stroke-width="3"/>
  <polygon points="847,346 871,346 859,362" fill="#86efac"/>

  <rect x="644" y="364" width="430" height="64" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="859" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#166534">2. Kaart + rapport klaar</text>
  <text x="859" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4ade80">Automatisch, direct bruikbaar voor beslissingen</text>

  <polygon points="828,530 842,530 834,550 850,550 830,578 838,554 820,554" fill="#16a34a"/>
  <text x="864" y="560" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#16a34a">Minder dan 1 minuut</text>

  <rect x="88" y="606" width="1024" height="50" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="600" y="637" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">AI doet hetzelfde werk — maar dan direct, zonder wachten</text>
</svg>
