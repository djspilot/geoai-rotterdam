<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Introductie vandaag met AI en geo kaart Rotterdam">
  <title>Introductie: Vandaag werken we met AI</title>
  <desc>Van veel informatie naar een geo kaart van Rotterdam en daarna sturen met dashboard of rapport.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">
    Vandaag werken we met AI
  </text>
  <text x="600" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">
    Van veel informatie naar een kaart van Rotterdam en daarna sturen op inzicht
  </text>

  <rect x="90" y="190" width="280" height="190" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">1. Informatie</text>
  <text x="230" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">Data, documenten,</text>
  <text x="230" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">waarnemingen</text>

  <line x1="370" y1="285" x2="470" y2="285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="470" y="190" width="280" height="190" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="610" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">2. Geo kaart</text>
  <text x="610" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1d4ed8">Rotterdam op de kaart</text>
  <text x="610" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1d4ed8">met AI-actie</text>

  <line x1="750" y1="285" x2="850" y2="285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="850" y="190" width="260" height="190" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="980" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#14532d">3. Sturen</text>
  <text x="980" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#166534">Dashboard</text>
  <text x="980" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#166534">of rapport</text>

  <rect x="90" y="430" width="1020" height="150" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    Kernboodschap
  </text>
  <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#334155">
    AI helpt ons om informatie om te zetten naar een concrete geo kaart
  </text>
  <text x="600" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#334155">
    en daarna naar beslisinformatie voor teams en management
  </text>
</svg>
