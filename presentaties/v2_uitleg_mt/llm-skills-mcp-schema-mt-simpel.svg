<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Eenvoudig MT-schema: van vraag naar sturing">
  <title>Van vraag naar sturing met AI</title>
  <desc>Eenvoudige uitleg voor MT: je stelt een vraag, AI combineert kennis en data, en levert kaart, rapport en dashboard voor sturing.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="output-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>

  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Van kaartvraag naar sturen op resultaat</text>
  <text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#334155">Eenvoudige MT-uitleg: AI maakt van data direct bruikbare stuurinformatie</text>

  <g filter="url(#shadow)">
    <rect x="80" y="140" width="240" height="190" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="80" y="140" width="240" height="52" rx="16" fill="#e2e8f0"/>
    <rect x="80" y="166" width="240" height="26" fill="#e2e8f0"/>
    <text x="200" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">STAP 1</text>
    <text x="200" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e293b">Vraag stellen</text>
    <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">Bijvoorbeeld:</text>
    <text x="200" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">"% afvalbakken nabij</text>
    <text x="200" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">de Coolsingel"</text>
  </g>

  <line x1="325" y1="235" x2="405" y2="235" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="410" y="120" width="380" height="230" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="410" y="120" width="380" height="60" rx="18" fill="url(#header-grad)"/>
    <rect x="410" y="150" width="380" height="30" fill="url(#header-grad)"/>
    <text x="600" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#e0f2fe">STAP 2</text>
    <text x="600" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">AI combineert alles</text>

    <rect x="445" y="242" width="100" height="72" rx="10" fill="#e0f2fe"/>
    <text x="495" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0369a1">Kennis</text>
    <text x="495" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0c4a6e">skills</text>

    <rect x="550" y="242" width="100" height="72" rx="10" fill="#dbeafe"/>
    <text x="600" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Data</text>
    <text x="600" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e3a8a">MCP bronnen</text>

    <rect x="655" y="242" width="100" height="72" rx="10" fill="#dcfce7"/>
    <text x="705" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">Actie</text>
    <text x="705" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">tools</text>
  </g>

  <line x1="795" y1="235" x2="875" y2="235" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="880" y="140" width="240" height="190" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
    <rect x="880" y="140" width="240" height="52" rx="16" fill="#dcfce7"/>
    <rect x="880" y="166" width="240" height="26" fill="#dcfce7"/>
    <text x="1000" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#22c55e">STAP 3</text>
    <text x="1000" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#14532d">Kaart maken</text>
    <text x="1000" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">Statische kaart (PNG/SVG)</text>
    <text x="1000" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">Helder en direct bruikbaar</text>
  </g>

  <line x1="600" y1="360" x2="600" y2="420" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="440" width="960" height="220" rx="18" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
    <rect x="120" y="440" width="960" height="62" rx="18" fill="url(#output-grad)"/>
    <rect x="120" y="470" width="960" height="32" fill="url(#output-grad)"/>
    <text x="600" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#dcfce7">STAP 6</text>
    <text x="600" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#14532d">Hoe gaan we hierop sturen?</text>

    <text x="300" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#166534">Alleen de iepen</text>
    <text x="600" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#166534">% afvalbakken rond Coolsingel</text>
    <text x="900" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#166534">Waar zitten tekorten?</text>

    <text x="600" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#14532d">Uitkomst: rapport + dashboard + actielijst</text>
  </g>

  <rect x="120" y="686" width="960" height="46" rx="12" fill="#e2e8f0"/>
  <text x="600" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">MT-besluitvorming: van vraag naar concrete stuurinformatie</text>
</svg>
