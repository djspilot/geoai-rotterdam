<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Stappenplan van data naar sturen met dashboard">
  <title>Stappenplan: van data naar sturing</title>
  <desc>Drie stappen: data en vraag, geo kaart Rotterdam, en sturen via dashboard of rapport.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">
    Stappenplan van vandaag
  </text>
  <text x="600" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">
    Van veel input naar een geo kaart en daarna sturen op resultaat
  </text>

  <rect x="80" y="180" width="1040" height="340" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <circle cx="220" cy="290" r="46" fill="#e2e8f0"/>
  <text x="220" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">1</text>
  <text x="220" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">Vraag + data</text>
  <text x="220" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Wat willen we weten</text>
  <text x="220" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">over Rotterdam?</text>

  <line x1="300" y1="290" x2="500" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <circle cx="600" cy="290" r="46" fill="#dbeafe"/>
  <text x="600" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">2</text>
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Geo kaart</text>
  <text x="600" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">AI verwerkt data</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">naar kaartlagen</text>

  <line x1="680" y1="290" x2="880" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <circle cx="980" cy="290" r="46" fill="#dcfce7"/>
  <text x="980" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#166534">3</text>
  <text x="980" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">Sturen</text>
  <text x="980" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">Dashboard of rapport</text>
  <text x="980" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">voor besluitvorming</text>

  <rect x="140" y="550" width="920" height="78" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="600" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">
    Doel: sneller inzicht en beter sturen in de praktijk
  </text>
</svg>
