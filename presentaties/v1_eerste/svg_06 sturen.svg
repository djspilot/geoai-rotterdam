<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Wat kun je ermee sturen?</text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#475569">Van kaart naar concrete beslissingen voor Rotterdam</text>

  <!-- Card 1: Knelpunten in kaart -->
  <rect x="60" y="136" width="330" height="360" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="60" y="136" width="330" height="54" rx="16" fill="#e2e8f0"/>
  <rect x="60" y="162" width="330" height="28" fill="#e2e8f0"/>
  <text x="225" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">OUTPUT 1</text>
  <text x="225" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">Knelpunten in kaart</text>
  <text x="225" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Zie direct welke wijken</text>
  <text x="225" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">aandacht nodig hebben</text>

  <line x1="100" y1="308" x2="350" y2="308" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="225" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#64748b">Voorbeeldvragen:</text>
  <text x="225" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">"Welke buurten hebben</text>
  <text x="225" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">tekort aan afvalbakken?"</text>
  <text x="225" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">"Waar zitten de</text>
  <text x="225" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">meeste meldingen?"</text>
  <text x="225" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">→ Prioriteiten stellen per wijk</text>

  <!-- Card 2: Analyses voor vergadering -->
  <rect x="435" y="136" width="330" height="360" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <rect x="435" y="136" width="330" height="54" rx="16" fill="#dbeafe"/>
  <rect x="435" y="162" width="330" height="28" fill="#dbeafe"/>
  <text x="600" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#3b82f6">OUTPUT 2</text>
  <text x="600" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Rapport voor vergadering</text>
  <text x="600" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1d4ed8">Exporteer direct als PDF</text>
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1d4ed8">of presentatie</text>

  <line x1="475" y1="308" x2="725" y2="308" stroke="#bfdbfe" stroke-width="1.5"/>

  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Voorbeeldvragen:</text>
  <text x="600" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">"% afvalbakken nabij</text>
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">scholen in Rotterdam-Zuid"</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">"Vergelijk Rotterdam-Noord</text>
  <text x="600" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">met Rotterdam-Zuid"</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#60a5fa">→ Rapport klaar in minuten</text>

  <!-- Card 3: Dashboard -->
  <rect x="810" y="136" width="330" height="360" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <rect x="810" y="136" width="330" height="54" rx="16" fill="#dcfce7"/>
  <rect x="810" y="162" width="330" height="28" fill="#dcfce7"/>
  <text x="975" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#22c55e">OUTPUT 3</text>
  <text x="975" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#14532d">Live dashboard</text>
  <text x="975" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">Monitor veranderingen</text>
  <text x="975" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">per maand of kwartaal</text>

  <line x1="850" y1="308" x2="1100" y2="308" stroke="#bbf7d0" stroke-width="1.5"/>

  <text x="975" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#22c55e">Voorbeeldvragen:</text>
  <text x="975" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">"Waar zitten de</text>
  <text x="975" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">grootste tekorten?"</text>
  <text x="975" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">"Signaleer automatisch</text>
  <text x="975" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">nieuwe knelpunten"</text>
  <text x="975" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4ade80">→ Dashboard voor management</text>

  <!-- Bottom bar -->
  <rect x="88" y="530" width="1024" height="58" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="600" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412">Van kaart naar beslissing: direct, concreet en visueel</text>
</svg>
