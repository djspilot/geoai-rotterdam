<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Title & Subtitle -->
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#0f172a">Vandaag: Van Informatie naar Sturing</text>
  <text x="600" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">In drie stappen naar een onderbouwde beslissing voor Rotterdam</text>

  <!-- Process Flow -->
  <!-- Step 1 -->
  <rect x="50" y="200" width="280" height="180" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="190" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b">1. Informatie</text>
  <text x="190" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#64748b">Ruwe data, meldingen</text>
  <text x="190" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#64748b">en beleidsstukken</text>
  <text x="190" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#94a3b8">(De Bron)</text>

  <line x1="330" y1="290" x2="410" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="410" y="180" width="380" height="220" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="600" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">2. Het Product: De Kaart</text>
  <text x="600" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">AI vertaalt data naar beeld</text>
  <text x="600" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">Analyseert patronen en</text>
  <text x="600" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">visualiseert knelpunten</text>
  <text x="600" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">HET FUNDAMENT</text>

  <line x1="790" y1="290" x2="870" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="870" y="200" width="280" height="180" rx="20" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="1010" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#14532d">3. Sturing</text>
  <text x="1010" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#166534">Rapportage &amp; Dashboard</text>
  <text x="1010" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#166534">Directe onderbouwing</text>
  <text x="1010" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#4ade80">(Het Besluit)</text>

  <!-- Bottom bar -->
  <rect x="50" y="540" width="1100" height="75" rx="14" fill="#0f172a"/>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Doel: Van 'horen zeggen' naar 'zien en sturen'.</text>
</svg>
