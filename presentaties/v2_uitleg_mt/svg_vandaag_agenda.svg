<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Vandaag: Van data naar GIS kaart en manageerbaar rapport">
  <title>Vandaag: Twee-staps proces</title>
  <desc>Stap 1: Van informatie naar GIS kaart. Stap 2: Van resultaat naar bruikbaar rapport/dashboard voor managers.</desc>

  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="step1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c2563"/>
    </linearGradient>
    <linearGradient id="step2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b1f5e"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bg2)" rx="16"/>

  <!-- Header -->
  <text x="450" y="42" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#f1f5f9" text-anchor="middle">Vandaag: van rauwe data naar bruikbaar inzicht</text>
  <text x="450" y="68" font-family="system-ui,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Twee stappen — technisch tot bruikbaar voor beslissers</text>

  <!-- Divider line -->
  <line x1="450" y1="95" x2="450" y2="420" stroke="#334155" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- STEP 1 — Left side -->
  <rect x="40" y="95" width="390" height="340" rx="14" fill="url(#step1Grad)" filter="url(#shadow)"/>
  <rect x="40" y="95" width="390" height="44" rx="14" fill="#1d4ed8"/>
  <rect x="40" y="125" width="390" height="14" fill="#1d4ed8"/>
  <!-- Step number badge -->
  <circle cx="72" cy="117" r="18" fill="#ffffff"/>
  <text x="72" y="123" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#1d4ed8" text-anchor="middle">1</text>
  <text x="200" y="122" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Van informatie → GIS kaart</text>

  <!-- Data to map flow -->
  <rect x="60" y="155" width="170" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">📊 Ruwe data</text>
  <text x="145" y="193" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">bomen, lichtpunten, afval</text>

  <path d="M 230 180 L 280 180" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arr1)"/>
  <text x="255" y="170" font-family="system-ui,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">Codex</text>

  <rect x="295" y="155" width="115" height="50" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="352" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">⚙️ Python code</text>
  <text x="352" y="193" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">geopandas + matplotlib</text>

  <!-- Arrow down -->
  <path d="M 352 215 L 352 245" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arr1)"/>
  <text x="372" y="233" font-family="system-ui,sans-serif" font-size="10" fill="#60a5fa">uitvoeren</text>

  <!-- Map result -->
  <rect x="230" y="258" width="230" height="155" rx="10" fill="#0a1628" stroke="#3b82f6" stroke-width="2"/>
  <!-- Map content -->
  <rect x="245" y="275" width="80" height="55" rx="4" fill="#1e3a5f" opacity="0.5"/>
  <rect x="290" y="290" width="45" height="40" rx="4" fill="#22c55e" opacity="0.4"/>
  <rect x="310" y="280" width="55" height="30" rx="4" fill="#f59e0b" opacity="0.4"/>
  <rect x="330" y="300" width="40" height="50" rx="4" fill="#a855f7" opacity="0.3"/>
  <rect x="260" y="310" width="60" height="45" rx="4" fill="#3b82f6" opacity="0.3"/>
  <rect x="285" y="330" width="70" height="35" rx="4" fill="#06b6d4" opacity="0.3"/>
  <rect x="340" y="275" width="30" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
  <!-- Map grid lines -->
  <line x1="245" y1="305" x2="375" y2="305" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="245" y1="330" x2="375" y2="330" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="280" y1="275" x2="280" y2="395" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="320" y1="275" x2="320" y2="395" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Map dots representing data points -->
  <circle cx="260" cy="285" r="4" fill="#22c55e"/>
  <circle cx="300" cy="295" r="4" fill="#22c55e"/>
  <circle cx="330" cy="320" r="4" fill="#22c55e"/>
  <circle cx="350" cy="290" r="4" fill="#22c55e"/>
  <circle cx="280" cy="340" r="4" fill="#22c55e"/>
  <text x="345" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">🗺️ kaart.png</text>

  <!-- Label -->
  <text x="215" y="435" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">GIS kaart</text>

  <!-- Step 1 description -->
  <text x="235" y="458" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Verbind data met locatie → visualiseer</text>


  <!-- STEP 2 — Right side -->
  <rect x="470" y="95" width="390" height="340" rx="14" fill="url(#step2Grad)" filter="url(#shadow)"/>
  <rect x="470" y="95" width="390" height="44" rx="14" fill="#6d28d9"/>
  <rect x="470" y="125" width="390" height="14" fill="#6d28d9"/>
  <!-- Step number badge -->
  <circle cx="502" cy="117" r="18" fill="#ffffff"/>
  <text x="502" y="123" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#6d28d9" text-anchor="middle">2</text>
  <text x="640" y="122" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Kaart → Rapport / Dashboard</text>

  <!-- Map input -->
  <rect x="490" y="158" width="140" height="55" rx="8" fill="#1e1040" stroke="#a855f7" stroke-width="1.5"/>
  <text x="560" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">🗺️ GIS kaart</text>
  <text x="560" y="196" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">kaart.png, statistieken</text>

  <path d="M 630 185 L 660 185" stroke="#a78bfa" stroke-width="2.5" fill="none"/>
  <polygon points="658,180 673,185 658,190" fill="#a78bfa"/>
  <text x="645" y="175" font-family="system-ui,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Analyse</text>

  <!-- Analysis block -->
  <rect x="675" y="155" width="165" height="60" rx="8" fill="#1e1040" stroke="#a855f7" stroke-width="1.5"/>
  <text x="757" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">📈 Data analyse</text>
  <text x="757" y="193" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">per wijk, type, conditie</text>

  <!-- Arrow down -->
  <path d="M 757 225 L 757 255" stroke="#a78bfa" stroke-width="2.5" fill="none"/>
  <polygon points="752,248 757,263 762,248" fill="#a78bfa"/>

  <!-- Dashboard / Report output -->
  <rect x="490" y="265" width="350" height="155" rx="10" fill="#0a0a14" stroke="#7c3aed" stroke-width="2"/>

  <!-- Report header -->
  <rect x="500" y="278" width="120" height="18" rx="4" fill="#4c1d95"/>
  <text x="560" y="291" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#e9d5ff" text-anchor="middle">Dashboard / Rapport</text>

  <!-- KPI cards row -->
  <rect x="500" y="305" width="80" height="50" rx="6" fill="#1e1040" stroke="#6d28d9" stroke-width="1"/>
  <text x="540" y="322" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#22c55e" text-anchor="middle">12.847</text>
  <text x="540" y="342" font-family="system-ui,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Bomen totaal</text>

  <rect x="590" y="305" width="80" height="50" rx="6" fill="#1e1040" stroke="#6d28d9" stroke-width="1"/>
  <text x="630" y="322" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#f59e0b" text-anchor="middle">847</text>
  <text x="630" y="342" font-family="system-ui,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Aandacht nodig</text>

  <rect x="680" y="305" width="80" height="50" rx="6" fill="#1e1040" stroke="#6d28d9" stroke-width="1"/>
  <text x="720" y="322" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#3b82f6" text-anchor="middle">94%</text>
  <text x="720" y="342" font-family="system-ui,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">In goede conditie</text>

  <rect x="770" y="305" width="60" height="50" rx="6" fill="#1e1040" stroke="#6d28d9" stroke-width="1"/>
  <text x="800" y="322" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#a855f7" text-anchor="middle">14</text>
  <text x="800" y="342" font-family="system-ui,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Wijken</text>

  <!-- Mini bar chart -->
  <rect x="500" y="365" width="330" height="45" rx="6" fill="#0a0a14"/>
  <text x="510" y="380" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Verdeling per wijk:</text>
  <rect x="510" y="388" width="35" height="14" rx="2" fill="#22c55e"/>
  <rect x="550" y="388" width="50" height="14" rx="2" fill="#3b82f6"/>
  <rect x="605" y="392" width="25" height="10" rx="2" fill="#f59e0b"/>
  <rect x="635" y="390" width="40" height="12" rx="2" fill="#a855f7"/>
  <rect x="680" y="393" width="20" height="9" rx="2" fill="#06b6d4"/>
  <rect x="705" y="389" width="45" height="13" rx="2" fill="#ef4444"/>
  <rect x="755" y="391" width="30" height="11" rx="2" fill="#64748b"/>
  <rect x="790" y="394" width="20" height="8" rx="2" fill="#64748b"/>
  <text x="820" y="400" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">→</text>

  <!-- Label -->
  <text x="665" y="435" font-family="system-ui,sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">Bruikbaar rapport</text>

  <!-- Step 2 description -->
  <text x="665" y="458" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Stuur aan, snap results, neem beslissingen</text>

  <!-- Footer note -->
  <rect x="40" y="440" width="820" height="30" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="459" font-family="system-ui,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Jij ↔ Codex ↔ VS Code: technisch werk gedaan • Manager krijgt alleen wat hij nodig heeft</text>
</svg>