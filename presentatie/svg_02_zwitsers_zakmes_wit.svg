<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Het Zwitsers zakmes: programma waarin AI kaarten maakt">
  <title>Het Zwitsers zakmes voor GeoAI</title>
  <desc>Een programma waarin je AI aan het werk zet om vanuit data geo kaarten te maken.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>

  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">
    De tool: ons Zwitsers zakmes
  </text>
  <text x="600" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">
    Hier zetten we AI aan het werk om van data naar kaarten te gaan
  </text>

  <rect x="120" y="170" width="960" height="380" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="120" y="170" width="960" height="46" rx="16" fill="#e2e8f0"/>
  <circle cx="150" cy="193" r="7" fill="#ef4444"/>
  <circle cx="172" cy="193" r="7" fill="#f59e0b"/>
  <circle cx="194" cy="193" r="7" fill="#22c55e"/>
  <text x="620" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">
    VS Code + Codex werkruimte
  </text>

  <rect x="150" y="235" width="440" height="280" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="170" y="267" font-family="Courier New, monospace" font-size="19" fill="#1e293b">prompt: maak een geo kaart van Rotterdam</text>
  <text x="170" y="298" font-family="Courier New, monospace" font-size="17" fill="#475569">- combineer databronnen</text>
  <text x="170" y="326" font-family="Courier New, monospace" font-size="17" fill="#475569">- filter op thema</text>
  <text x="170" y="354" font-family="Courier New, monospace" font-size="17" fill="#475569">- toon hotspots</text>
  <text x="170" y="382" font-family="Courier New, monospace" font-size="17" fill="#475569">- maak output voor dashboard</text>

  <rect x="170" y="420" width="390" height="72" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="190" y="448" font-family="Courier New, monospace" font-size="16" fill="#0f172a">AI draait acties:</text>
  <text x="190" y="474" font-family="Courier New, monospace" font-size="16" fill="#334155">data laden -> verwerken -> kaart maken</text>

  <line x1="610" y1="350" x2="690" y2="350" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="710" y="235" width="340" height="280" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="880" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">Resultaat</text>
  <rect x="760" y="294" width="240" height="145" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="880" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1d4ed8">Geo kaart Rotterdam</text>
  <text x="880" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">Lagen, patronen,</text>
  <text x="880" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">en prioriteiten</text>
  <text x="880" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">Klaar voor dashboard/rapport</text>

  <text x="600" y="614" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#334155">
    Dit is de omgeving waar we nu in zitten
  </text>
</svg>
